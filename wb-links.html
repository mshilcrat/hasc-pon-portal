<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HASC – Training Links</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f4f7;color:#1f2937;min-height:100vh}
  .header{background:#fff;border-bottom:3px solid #16b3c6;padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .header img{height:34px}
  .header .title{font-weight:700;font-size:16px;color:#0f172a}
  .header .nav{display:flex;gap:8px;margin-left:auto;align-items:center}
  .header .nav a{font-size:13px;color:#475569;text-decoration:none;border:1px solid #cbd5e1;border-radius:8px;padding:5px 11px}
  .header .nav a:hover{background:#f1f5f9}
  .wrap{max-width:920px;margin:0 auto;padding:26px 18px}
  .card{background:#fff;border-radius:14px;box-shadow:0 3px 12px rgba(0,0,0,.06);padding:22px;border:1px solid #eef2f6}
  .card h2{font-size:18px;margin-bottom:4px}
  .card .sub{font-size:13px;color:#64748b;margin-bottom:18px}
  .add-row{display:grid;grid-template-columns:1fr 1.4fr auto;gap:12px;align-items:end;background:#f8fafc;border:1px solid #eef2f6;border-radius:12px;padding:16px;margin-bottom:18px}
  .add-row label{display:block;font-size:11px;font-weight:700;letter-spacing:.04em;color:#64748b;margin-bottom:5px;text-transform:uppercase}
  .add-row input{width:100%;padding:10px 11px;border:1px solid #d1d5db;border-radius:9px;font-size:14px}
  .add-row input:focus{outline:none;border-color:#16b3c6;box-shadow:0 0 0 3px rgba(22,179,198,.15)}
  .btn-add{background:#0f9d8f;color:#fff;border:none;border-radius:9px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
  .btn-add:hover{background:#0b857a}
  .item{border:1px solid #eef2f6;border-radius:12px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .item .info{flex:1;min-width:200px}
  .item .name{font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px}
  .pill{background:#dcfce7;color:#166534;font-size:11px;font-weight:700;border-radius:999px;padding:2px 9px}
  .pill.warn{background:#fef3c7;color:#92400e}
  .item .url{font-size:12px;color:#64748b;margin-top:3px;word-break:break-all}
  .item .added{font-size:11px;color:#94a3b8;margin-top:3px}
  .item .acts{display:flex;gap:8px}
  .ibtn{border:1px solid #cbd5e1;background:#fff;border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;color:#334155}
  .ibtn:hover{background:#f1f5f9}
  .ibtn.del{padding:7px 10px}
  .foot{font-size:12px;color:#94a3b8;margin-top:6px}
  .empty{text-align:center;color:#94a3b8;padding:26px;font-size:14px}
  @media(max-width:640px){.add-row{grid-template-columns:1fr}.btn-add{width:100%}}
</style>
</head>
<body>
<div class="header">
  <img src="hasc-logo.png" alt="HASC Center">
  <span class="title">Training Links</span>
  <span class="nav">
    <a href="javascript:history.back()">← Back</a>
    <a href="wb-index.html">🏠 Home</a>
  </span>
</div>
<div class="wrap">
  <div class="card">
    <h2>Training Links Library</h2>
    <p class="sub">Saved training links so RMs can grab them without hunting. Links auto-delete after 60 days.</p>
    <div class="add-row">
      <div>
        <label for="lname">Name this training</label>
        <input id="lname" placeholder="e.g. Fire safety annual">
      </div>
      <div>
        <label for="lurl">Training URL</label>
        <input id="lurl" placeholder="https://...">
      </div>
      <button class="btn-add" id="addBtn">+ Add</button>
    </div>
    <div id="list"></div>
    <div class="foot" id="foot">0 saved · stored on this browser</div>
  </div>
</div>
<script>
  const KEY = 'hasc_training_links';
  const TTL = 60 * 24 * 60 * 60 * 1000; // 60 days
  const listEl = document.getElementById('list');
  const footEl = document.getElementById('foot');

  function load(){
    let arr = [];
    try { arr = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(e){ arr = []; }
    const now = Date.now();
    arr = arr.filter(x => (now - x.added) < TTL);
    localStorage.setItem(KEY, JSON.stringify(arr));
    return arr;
  }
  function save(arr){ localStorage.setItem(KEY, JSON.stringify(arr)); }

  function daysLeft(added){
    const left = TTL - (Date.now() - added);
    return Math.max(0, Math.ceil(left / (24*60*60*1000)));
  }
  function agoText(added){
    const d = Math.floor((Date.now() - added) / (24*60*60*1000));
    if(d <= 0) return 'Added today';
    return 'Added ' + d + ' day' + (d===1?'':'s') + ' ago';
  }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function render(){
    const arr = load();
    if(arr.length === 0){
      listEl.innerHTML = '<div class="empty">No saved links yet. Add one above.</div>';
    } else {
      listEl.innerHTML = arr.map((x,i) => {
        const dl = daysLeft(x.added);
        const pillClass = dl <= 7 ? 'pill warn' : 'pill';
        return '<div class="item">' +
          '<div class="info">' +
            '<div class="name">' + esc(x.name) + ' <span class="' + pillClass + '">' + dl + ' day' + (dl===1?'':'s') + ' left</span></div>' +
            '<div class="url">' + esc(x.url) + '</div>' +
            '<div class="added">' + agoText(x.added) + '</div>' +
          '</div>' +
          '<div class="acts">' +
            '<button class="ibtn" data-act="copy" data-i="' + i + '">📋 Copy</button>' +
            '<button class="ibtn" data-act="open" data-i="' + i + '">↗ Open</button>' +
            '<button class="ibtn del" data-act="del" data-i="' + i + '">🗑</button>' +
          '</div>' +
        '</div>';
      }).join('');
    }
    footEl.textContent = arr.length + ' saved · stored on this browser';
  }

  document.getElementById('addBtn').addEventListener('click', () => {
    const name = document.getElementById('lname').value.trim();
    const url = document.getElementById('lurl').value.trim();
    if(!name || !url){ alert('Please enter a name and a URL.'); return; }
    const arr = load();
    arr.unshift({ name, url, added: Date.now() });
    save(arr);
    document.getElementById('lname').value = '';
    document.getElementById('lurl').value = '';
    render();
  });

  listEl.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-act]');
    if(!btn) return;
    const arr = load();
    const i = parseInt(btn.dataset.i, 10);
    const item = arr[i];
    if(!item) return;
    const act = btn.dataset.act;
    if(act === 'copy'){
      navigator.clipboard.writeText(item.url);
      btn.textContent = '✓ Copied';
      setTimeout(() => { btn.textContent = '📋 Copy'; }, 1200);
    } else if(act === 'open'){
      window.open(item.url, '_blank');
    } else if(act === 'del'){
      arr.splice(i, 1);
      save(arr);
      render();
    }
  });

  render();
</script>
</body>
</html>
