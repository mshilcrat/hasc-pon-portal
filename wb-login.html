<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HASC Training Workbook — Sign In</title>
<style>
html,body{margin:0;padding:0;height:100%;background:#f4f6f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a2e;}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.1);padding:34px 30px;width:100%;max-width:360px;border-top:4px solid #3FC1C9;}
.logo{display:flex;justify-content:center;margin-bottom:18px;}
.logo img{height:42px;width:auto;display:block;}
h1{font-size:18px;font-weight:800;text-align:center;margin:0 0 4px;color:#1a8c94;}
.sub{font-size:12px;color:#8a9ab0;text-align:center;margin:0 0 22px;}
label{display:block;font-size:12px;font-weight:600;color:#5a6a7e;margin:0 0 5px;}
input{width:100%;padding:10px 12px;border:1.5px solid #dce3ea;border-radius:9px;font-size:14px;outline:none;background:#f8fafc;margin-bottom:14px;box-sizing:border-box;}
input:focus{border-color:#3FC1C9;background:#fff;}
button{width:100%;padding:11px;border:none;border-radius:9px;background:#3FC1C9;color:#fff;font-size:14px;font-weight:700;cursor:pointer;}
button:disabled{opacity:.6;cursor:default;}
.msg{font-size:12.5px;margin:4px 0 12px;min-height:16px;text-align:center;}
.msg.err{color:#c62828;}
.msg.ok{color:#1a8c94;}
.note{font-size:11px;color:#a8b3c0;text-align:center;margin-top:16px;line-height:1.5;}
</style>
</head>
<body>
<div class="wrap"><div class="card">
<div class="logo"><img src="hasc-logo.png" alt="HASC Center"></div>
<h1>Training Workbook</h1>
<p class="sub">Sign in to continue</p>
<form id="loginForm">
<label for="email">Email</label>
<input type="email" id="email" autocomplete="username" required>
<label for="password">Password</label>
<input type="password" id="password" autocomplete="current-password" required>
<div class="msg" id="msg"></div>
<button type="submit" id="btn">Sign In</button>
</form>
<p class="note">Secure sign-in. Your password is checked by the server, never stored in this page.</p>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="wb-config.js"></script>
<script>
var sb=window.supabase.createClient(window.HASC_CONFIG.SUPABASE_URL, window.HASC_CONFIG.SUPABASE_ANON_KEY);
var msg=document.getElementById("msg");
var btn=document.getElementById("btn");
(async function(){
  var s=await sb.auth.getSession();
  if(s.data && s.data.session){ window.location.href="wb-library.html"; }
})();
document.getElementById("loginForm").addEventListener("submit", async function(e){
  e.preventDefault();
  msg.className="msg"; msg.textContent="";
  btn.disabled=true; btn.textContent="Signing in…";
  var email=document.getElementById("email").value.trim();
  var password=document.getElementById("password").value;
  try{
    var r=await sb.auth.signInWithPassword({email:email, password:password});
    if(r.error){ msg.className="msg err"; msg.textContent=r.error.message; btn.disabled=false; btn.textContent="Sign In"; return; }
    msg.className="msg ok"; msg.textContent="Signed in. Loading…";
    window.location.href="wb-library.html";
  }catch(err){
    msg.className="msg err"; msg.textContent="Could not sign in. Please try again."; btn.disabled=false; btn.textContent="Sign In";
  }
});
</script>
</body>
</html>
