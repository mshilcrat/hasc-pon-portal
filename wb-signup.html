<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HASC Training Portal - Sign Up</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }
  body { background:#f4f6f9; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .card { background:#fff; width:100%; max-width:420px; border-radius:14px; box-shadow:0 8px 30px rgba(0,0,0,.08); padding:34px 30px; }
  .logo { display:block; margin:0 auto 22px; max-width:240px; height:auto; }
  h1 { font-size:20px; color:#222; text-align:center; margin-bottom:6px; }
  p.sub { font-size:13px; color:#777; text-align:center; margin-bottom:22px; }
  label { display:block; font-size:13px; color:#444; margin:14px 0 6px; font-weight:600; }
  input { width:100%; padding:11px 12px; border:1px solid #d5d9e0; border-radius:8px; font-size:14px; }
  input:focus { outline:none; border-color:#29b6c9; box-shadow:0 0 0 3px rgba(41,182,201,.15); }
  button { width:100%; margin-top:22px; padding:12px; border:none; border-radius:8px; background:#29b6c9; color:#fff; font-size:15px; font-weight:600; cursor:pointer; }
  button:hover { background:#1fa2b4; }
  button:disabled { background:#9ad6df; cursor:not-allowed; }
  .msg { margin-top:16px; font-size:13px; text-align:center; padding:10px; border-radius:8px; display:none; }
  .msg.error { display:block; background:#fdecea; color:#c0392b; }
  .msg.ok { display:block; background:#eafaf1; color:#1296a6; }
  .foot { text-align:center; margin-top:18px; font-size:13px; color:#777; }
  .foot a { color:#29b6c9; text-decoration:none; font-weight:600; }
</style>
</head>
<body>
  <div class="card">
    <img src="hasc-logo.png" alt="HASC Center" class="logo">
    <h1>Create your account</h1>
    <p class="sub">Sign up to access the training portal.</p>

    <label for="name">Full name</label>
    <input id="name" type="text" autocomplete="name" placeholder="Jane Smith">

    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="email" placeholder="you@example.com">

    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="new-password" placeholder="At least 6 characters">

    <button id="signupBtn">Create account</button>
    <div id="msg" class="msg"></div>

    <p class="foot">Already have an account? <a href="wb-login.html">Sign in</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="wb-config.js"></script>
  <script>
    const sb = window.sb || supabase.createClient(window.HASC_CONFIG.SUPABASE_URL, window.HASC_CONFIG.SUPABASE_ANON_KEY);
    const btn = document.getElementById('signupBtn');
    const msg = document.getElementById('msg');

    function show(text, type) { msg.textContent = text; msg.className = 'msg ' + type; }

    btn.addEventListener('click', async () => {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!name || !email || !password) { show('Please fill in all fields.', 'error'); return; }
      if (password.length < 6) { show('Password must be at least 6 characters.', 'error'); return; }

      btn.disabled = true; show('Creating your account...', 'ok');

      const { data, error } = await sb.auth.signUp({
        email: email,
        password: password,
        options: { data: { full_name: name, role: 'staff' } }
      });

      if (error) { show(error.message, 'error'); btn.disabled = false; return; }

      show('Account created! You can now sign in.', 'ok');
      setTimeout(() => { window.location.href = 'wb-login.html'; }, 2000);
    });
  </script>
</body>
</html>
